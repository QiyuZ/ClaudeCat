name: release

# Build the Windows installer and publish a GitHub Release whenever a version tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
# The release is created as a draft — review the attached .msi / -setup.exe, then hit publish.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for tauri-action to create the release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClaudeCat ${{ github.ref_name }}"
          releaseBody: "A hand-drawn desktop cat for your Claude Code usage. Download the `-setup.exe` (or `.msi`) below to install."
          releaseDraft: true
          prerelease: false
